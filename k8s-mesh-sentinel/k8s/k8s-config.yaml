apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: websocket-server
  template:
    metadata:
      labels:
        app: websocket-server
    spec:
      containers:
      - name: server
        image: dev-websocket:latest
        imagePullPolicy: Never  
        ports:
        - containerPort: 8765
---
apiVersion: v1
kind: Service
metadata:
  name: websocket-service
spec:
  type: NodePort
  selector:
    app: websocket-server
  ports:
    - port: 8765
      targetPort: 8765
      nodePort: 30000  
